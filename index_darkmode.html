function getWeather(lat, lon, city) {
    const weatherDiv = document.getElementById("weather");
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
    .then(r => r.json()).then(d => {
        const temp = Math.round(d.current_weather.temperature);
        const code = d.current_weather.weathercode;
        const mapping = { 0: "☀️ 晴天", 1: "🌤️ 多雲", 2: "⛅ 多雲", 3: "☁️ 陰天", 61: "🌧️ 小雨", 95: "⛈️ 雷陣雨" };
        weatherDiv.innerHTML = `<i class="fa-solid fa-location-dot text-pink-500 mr-1"></i> ${city} ${temp}°C ${mapping[code] || "☁️"}`;
    });
}

        { time: "15:20", name: "中部機場", url: "https://www.centrair.jp/", map: "Central Japan Airport Station", icon: "✈️", desc: ["@Flight of Dreams"] }]
    }
];
let tripData = JSON.parse(localStorage.getItem("trip_v24_ui")) || fullDatabase;

function renderDays(activeIndex = 0) {
    const daysDiv = document.getElementById("days");
    daysDiv.innerHTML = "";
    tripData.forEach((d, i) => {
        const btn = document.createElement("button");
        btn.id = `btn-${i}`;
        btn.innerHTML = `<div class='text-[10px] opacity-40 mb-0.5'>${d.date}</div><div class='text-base font-black'>${d.day}</div>`;
        btn.className = `flex-shrink-0 px-6 py-2 border-2 border-slate-700 rounded-[1.2rem] bg-slate-800 text-slate-400 transition-all active:scale-95`;
        if (i === activeIndex) btn.classList.add("active-btn");
        btn.onclick = () => { renderContent(i); btn.scrollIntoView({ behavior: 'smooth', inline: 'center' }); };
        daysDiv.appendChild(btn);
    });
}

function renderContent(i) {
    const app = document.getElementById("app");
    const d = tripData[i];
    getWeather(d.lat, d.lon, d.city);

    let passHtml = d.pass ? `
        <div class="pass-card">
            <div class="flex justify-between items-center mb-3">
                <span class="text-amber-500 font-black text-xs uppercase tracking-widest"><i class="fa-solid fa-id-card mr-2"></i>Quick Pass</span>
                <a target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.pass.hotel_map || d.hotel)}" class="text-amber-500/60 hover:text-amber-400"><i class="fa-solid fa-house-chimney"></i></a>
            </div>
            <div class="text-white font-black text-sm mb-3">${d.pass.code || "續住免 Check-in"}</div>
            <div class="flex flex-wrap gap-2">
                ${(d.pass.tickets || []).map(t => {
                    const isMail = t.url.includes('mail.google.com');
                    const isPDF = t.url.toLowerCase().includes('.pdf');
                    
                    let icon = 'fa-globe';
                    let action = `target="_blank" rel="noopener noreferrer"`;
                    let href = t.url;
                    let extra = '';
                
                    if (isMail) {
                        icon = 'fa-envelope';
                        href = '#';
                        action = '';
                        extra = `onclick="handleMailClick()"`;
                    } else if (isPDF) {
                        icon = 'fa-file-pdf';
                    } else {
                        icon = 'fa-link';
                    }
                
                    return `
                    <a href="${href}" ${action} ${extra}
                       class="pass-link active:scale-95">
                        <i class="fa-solid ${icon}"></i> ${t.label}
                    </a>`;
                }).join("")}

            </div>
        </div>` : "";

    app.innerHTML = `
        <div class="card !border-l-[10px] !border-l-pink-500 !bg-slate-900 shadow-2xl">
            <h2 class="text-3xl font-black italic tracking-tighter text-white">${d.day} / ${d.title}</h2>
            <div class="mt-2 text-xs font-black text-slate-500 flex items-center"><i class="fa-solid fa-hotel mr-2 text-pink-500"></i> ${d.hotel}</div>
        </div>
        ${passHtml}
        ${d.items.map((e, idx) => `
            <div class="flex">
                <div class="time-badge">${e.time}</div>
                <div class="event-content border-slate-800">
                    <div class="card !p-5 !mb-0 shadow-lg border-slate-700/50">
                        <div class="flex justify-between items-center gap-2">
                            <div onclick="editItem(${i}, ${idx})" class="cursor-pointer flex-1 pr-4">
                                <div class="text-[10px] font-black text-pink-400 mb-1 opacity-60 uppercase">${e.icon || '📍'} Schedule</div>
                                <div class="font-black text-xl text-slate-100 leading-tight">${e.name}</div>
                            </div>
                            <div class="flex gap-2 flex-shrink-0 w-24 justify-end">
                                <a target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.city + ' ' + (e.map || e.name))}" 
                                   class="w-10 h-10 flex items-center justify-center bg-slate-700 text-slate-300 rounded-xl border border-slate-600 active:bg-pink-600 transition-colors">
                                   <i class="fa-solid fa-location-arrow"></i>
                                </a>
                                <a target="_blank" href="https://japantravel.navitime.com/zh-tw/area/jp/route/?from=current_location&to=${encodeURIComponent(e.map || e.name)}" 
                                   class="w-10 h-10 flex items-center justify-center bg-slate-700 text-slate-300 rounded-xl border border-slate-600 active:bg-green-600 transition-colors">
                                   <i class="fa-solid fa-train-subway"></i>
                                </a>
                            </div>
                        </div>
                        <div class="info-box">
                            <ul>
                                ${(e.desc || []).map((line, lIdx) => {
                                    const hasMap = line.startsWith('@');
                                    const cleanText = hasMap ? line.substring(1) : line;
                                    const searchStr = hasMap ? `${d.city} ${cleanText}` : cleanText;
                                    return `
                                        <li class="desc-item" ondblclick="deleteDesc(${i}, ${idx}, ${lIdx})">
                                            <div class="flex items-start gap-2">
                                                <span class="opacity-50 text-[10px] text-pink-500 mt-1.5">●</span>
                                                <span>${cleanText}</span>
                                            </div>
                                            ${hasMap ? `
                                                <a target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(searchStr)}" 
                                                   class="text-pink-500/50 hover:text-pink-400 p-1">
                                                    <i class="fa-solid fa-diamond-turn-right text-[10px]"></i>
                                                </a>
                                            ` : ''}
                                        </li>
                                    `;
                                }).join("")}
                            </ul>
                            ${e.url ? `<a href="${e.url}" target="_blank" class="link-tag"><i class="fa-solid fa-globe"></i> 景點官方資訊</a>` : ''}
                            <button onclick="addDesc(${i}, ${idx})" class="add-note-btn"><i class="fa-solid fa-circle-plus"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        `).join("")}
    `;
    document.querySelectorAll("#days button").forEach((b, idx) => b.classList.toggle("active-btn", idx === i));
}

function save() { localStorage.setItem("trip_v24_ui", JSON.stringify(tripData)); }
function resetData() { if(confirm("重置行程？")) { localStorage.removeItem("trip_v24_ui"); location.reload(); } }
function editItem(dayIdx, itemIdx) {
    const n = prompt("修改名稱", tripData[dayIdx].items[itemIdx].name);
    if(n){ tripData[dayIdx].items[itemIdx].name = n; save(); renderContent(dayIdx); }
}
function addDesc(dayIdx, itemIdx) {
    const n = prompt("新增筆記 (加上 @ 可導航)");
    if(n){ if(!Array.isArray(tripData[dayIdx].items[itemIdx].desc)) tripData[dayIdx].items[itemIdx].desc=[]; tripData[dayIdx].items[itemIdx].desc.push(n); save(); renderContent(dayIdx); }
}
function deleteDesc(dayIdx, itemIdx, lineIdx) {
    if(confirm("刪除？")){ tripData[dayIdx].items[itemIdx].desc.splice(lineIdx, 1); save(); renderContent(dayIdx); }
}
function handleMailClick() {
    if (isInAppBrowser()) {
        alert("⚠️ 目前在 LINE / FB 內建瀏覽器\n\n👉 請點右上角『用瀏覽器開啟』再使用");
        return;
    }

    const isMobile = /iPhone|Android/i.test(navigator.userAgent);

    if (isMobile) {
        alert("📩 Gmail 信件\n👉 請用 Gmail App 搜尋開啟");
    } else {
        window.open("https://mail.google.com", "_blank");
    }
}


function isInAppBrowser() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    return /Line|FBAN|FBAV|Instagram/i.test(ua);
}
renderDays(0);
renderContent(0);
</script>
</body>
</html>
